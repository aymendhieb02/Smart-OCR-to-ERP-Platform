<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Human Ground Truth Verification</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #eef2f7; color: #142033; }
    header { background: #10223f; color: white; padding: 18px 24px; }
    main { display: grid; grid-template-columns: minmax(420px, 54vw) 1fr; gap: 16px; padding: 16px; }
    .panel, .doc-list { background: white; border: 1px solid #d8e0ed; border-radius: 8px; padding: 14px; }
    .doc-list { margin: 16px; }
    img { width: 100%; max-height: 82vh; object-fit: contain; border: 1px solid #d8e0ed; background: white; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e1e7f0; padding: 8px; text-align: left; vertical-align: top; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #c9d4e5; border-radius: 5px; }
    textarea { min-height: 54px; }
    button { padding: 8px 10px; margin: 4px 4px 4px 0; font-weight: 700; }
    .status { border-radius: 999px; padding: 3px 8px; background: #eef2ff; font-size: 12px; }
    .missing { color: #a33333; } .confirmed { color: #176b3a; } .needs_review { color: #8a5a00; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 12px; }
    pre { white-space: pre-wrap; background: #f4f7fb; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>Human-Assisted Ground Truth Verification</h1>
    <p>Review from the invoice image. Candidates are suggestions only. Nothing becomes verified until every required field is confirmed by a human.</p>
  </header>
  <section class="doc-list" id="docList"></section>
  <main>
    <section class="panel">
      <h2 id="docTitle">Document</h2>
      <img id="docImage" alt="Selected invoice">
    </section>
    <section class="panel">
      <div class="toolbar">
        <button onclick="markReviewed()">Mark document reviewed</button>
        <button onclick="tryVerify()">Try mark verified</button>
        <button onclick="downloadLabel()">Download label JSON</button>
        <button onclick="downloadProgress()">Download progress JSON</button>
        <button onclick="downloadMarkdown()">Download progress MD</button>
      </div>
      <p id="docProgress"></p>
      <table>
        <thead><tr><th>Field</th><th>Candidate</th><th>Evidence</th><th>Confirmed Value</th><th>Status</th></tr></thead>
        <tbody id="fieldRows"></tbody>
      </table>
      <h3>Line Items</h3>
      <textarea id="lineItems" placeholder="Enter reviewed line items JSON array"></textarea>
      <label><input type="checkbox" id="lineItemsReviewed" onchange="saveCurrent()"> Line items reviewed from source document</label>
      <h3>Notes</h3>
      <textarea id="notes" placeholder="Human review notes"></textarea>
      <pre id="issues"></pre>
    </section>
  </main>

    function progressPayload() {
      const docs = packages.map(pack => ({
        document_id: pack.document_id,
        filename: pack.filename,
        status: state[pack.document_id].verification_status,
        completion_percent: completion(pack.document_id),
        issues: issuesFor(pack.document_id)
      }));
      return {
        schema_version: 2,
        generated_at: new Date().toISOString(),
        selected_document_count: docs.length,
        verified_documents: docs.filter(d => d.status === 'verified' && d.issues.length === 0).length,
        reviewed_documents: docs.filter(d => ['reviewed','verified'].includes(d.status)).length,
        completion_percent: Math.round(docs.reduce((a,d)=>a+d.completion_percent,0)/docs.length),
        accuracy_claims_allowed: docs.every(d => d.status === 'verified' && d.issues.length === 0),
        documents: docs
      };
    }

    function downloadProgress() {
      download('verification_summary.json', JSON.stringify(progressPayload(), null, 2));
    }

    function downloadMarkdown() {
      const p = progressPayload();
      const lines = ['# Verification Progress', '', `- Completion: ${p.completion_percent}%`, `- Verified documents: ${p.verified_documents}/${p.selected_document_count}`, `- Reviewed documents: ${p.reviewed_documents}/${p.selected_document_count}`, `- Accuracy claims allowed: ${p.accuracy_claims_allowed}`, '', '## Remaining Work', ''];
      for (const doc of p.documents) lines.push(`- ${doc.filename}: ${doc.issues.length ? doc.issues.join('; ') : 'complete'}`);
      download('verification_progress.md', lines.join('\n') + '\n', 'text/markdown');
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }
    function escapeAttr(text) { return escapeHtml(text).replace(/"/g, '&quot;'); }
    init();
  </script>
</body>
</html>
